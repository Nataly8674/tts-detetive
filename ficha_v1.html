<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Detetive - Ficha Mesa</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%;
    height: 100vh;
    overflow: hidden;
    background: #2a2010;
    font-family: 'Courier New', monospace;
  }
  .ficha {
    width: 100%;
    height: 100vh;
    background: #e8dfc0;
    border: 3px solid #4a5e2a;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }
  .faixa-lateral {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 42px;
    background: #4a5e2a;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .faixa-lateral span {
    color: #e8dfc0;
    font-size: 16px;
    font-weight: bold;
    letter-spacing: 4px;
    writing-mode: vertical-rl;
    transform: rotate(180deg);
    text-transform: uppercase;
  }
  .main {
    margin-left: 42px;
    display: flex;
    flex-direction: column;
    height: 100%;
  }
  .topo {
    background: #4a5e2a;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 16px 8px 10px;
    gap: 12px;
    flex-shrink: 0;
  }
  .titulo-jogo {
    color: #e8dfc0;
    font-size: 20px;
    font-weight: bold;
    letter-spacing: 6px;
    text-transform: uppercase;
  }
  .nome-area { display: flex; align-items: center; gap: 8px; }
  .nome-label { color: #c8d890; font-size: 13px; letter-spacing: 2px; }
  .nome-input {
    background: transparent;
    border: none;
    border-bottom: 1.5px solid #c8d890;
    color: #e8dfc0;
    font-family: 'Courier New', monospace;
    font-size: 15px;
    width: 200px;
    outline: none;
    text-align: center;
  }
  .btn-limpar {
    background: transparent;
    border: 1.5px solid #c8d890;
    color: #c8d890;
    font-size: 12px;
    padding: 4px 12px;
    cursor: pointer;
    border-radius: 2px;
    font-family: 'Courier New', monospace;
    letter-spacing: 2px;
  }
  .btn-limpar:hover { background: rgba(200,216,144,0.2); }
  .colunas {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    flex: 1;
    overflow: hidden;
  }
  .col {
    border-right: 2px solid #4a5e2a;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .col:last-child { border-right: none; }
  .col-header {
    background: #4a5e2a;
    color: #e8dfc0;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
    letter-spacing: 3px;
    padding: 8px 0;
    text-transform: uppercase;
    flex-shrink: 0;
  }
  .col-items { flex: 1; display: flex; flex-direction: column; }
  .item {
    display: flex;
    align-items: center;
    padding: 0 10px;
    gap: 8px;
    border-bottom: 1px solid rgba(74,94,42,0.22);
    cursor: pointer;
    flex: 1;
  }
  .item:last-child { border-bottom: none; }
  .item:hover { background: rgba(74,94,42,0.08); }
  .item-name {
    flex: 1;
    font-size: 20px;
    line-height: 1.3;
    color: #2a2010;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .checks { display: flex; gap: 6px; flex-shrink: 0; }
  .ck {
    width: 30px; height: 30px;
    border: 1.5px solid #4a5e2a;
    background: #faf5e4;
    border-radius: 2px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: bold; color: #8b1a1a;
    cursor: pointer;
  }
  .ck:hover { background: #d8cc98; }
  .ck.on { background: #b8a860; color: #6b0a0a; }
</style>
</head>
<body>
<div class="ficha">
  <div class="faixa-lateral"><span>&#128270; Detetive</span></div>
  <div class="main">
    <div class="topo">
      <span class="titulo-jogo">&#128270; Detetive</span>
      <div class="nome-area">
        <span class="nome-label">JOGADOR:</span>
        <input class="nome-input" type="text" placeholder="seu nome" />
      </div>
      <button class="btn-limpar" onclick="limpar()">LIMPAR</button>
    </div>
    <div class="colunas" id="cols"></div>
  </div>
</div>
<script>
const dados = {
  suspeitos: ["Sgt. Bigode","Florista D. Branca","Chef Tony Gourmet","Mordomo Jones","Médica D. Violeta","Dançarina Srta. Rosa","Coveiro S. Soturno","Advogado Sr. Marinho"],
  armas: ["Espingarda","Pá","Pé-de-Cabra","Tesqua","Arma Química","Veneno","Soco Inglês","Faca"],
  locais: ["Prefeitura","Restaurante","Floricultura","Boate","Hospital","Mansão","Cemitério","Praça","Hotel","Banco","Est. de Trem"]
};
function toggle(ck) {
  if (ck.classList.contains('on')) { ck.classList.remove('on'); ck.textContent=''; }
  else { ck.classList.add('on'); ck.textContent='X'; }
}
function limpar() {
  document.querySelectorAll('.ck').forEach(c => { c.classList.remove('on'); c.textContent=''; });
}
function mkCol(titulo, itens, pref) {
  const col = document.createElement('div');
  col.className = 'col';
  col.innerHTML = `<div class="col-header">${titulo}</div>`;
  const wrap = document.createElement('div');
  wrap.className = 'col-items';
  itens.forEach((nome, i) => {
    const row = document.createElement('div');
    row.className = 'item';
    const nm = document.createElement('span');
    nm.className = 'item-name';
    nm.textContent = nome;
    const cks = document.createElement('div');
    cks.className = 'checks';
    for (let c = 0; c < 4; c++) {
      const ck = document.createElement('div');
      ck.className = 'ck';
      ck.onclick = e => { e.stopPropagation(); toggle(ck); };
      cks.appendChild(ck);
    }
    row.onclick = () => {
      const v = [...cks.querySelectorAll('.ck')].find(c => !c.classList.contains('on'));
      if (v) toggle(v); else [...cks.querySelectorAll('.ck')].forEach(c => { c.classList.remove('on'); c.textContent=''; });
    };
    row.appendChild(nm); row.appendChild(cks);
    wrap.appendChild(row);
  });
  col.appendChild(wrap);
  return col;
}
const cols = document.getElementById('cols');
cols.appendChild(mkCol('SUSPEITOS', dados.suspeitos, 's'));
cols.appendChild(mkCol('ARMAS', dados.armas, 'a'));
cols.appendChild(mkCol('LOCAIS', dados.locais, 'l'));
</script>
</body>
</html>
